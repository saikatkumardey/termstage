    6.0850% { opacity: 1; animation-timing-function: steps(1, end); }
    15.789%      { opacity: 0; }
    100%       { opacity: 0; }
  }
  .cursor-cmd0 {
    opacity: 0;
    animation: cursor-cmd0 8.233s linear 0s infinite;
  }

