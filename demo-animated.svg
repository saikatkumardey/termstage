  <style>
  @keyframes type-cmd0 {
    0%    { clip-path: inset(0 100% 0 0); }
    6.073%  { clip-path: inset(0 100% 0 0); animation-timing-function: steps(24, end); }
    15.789%  { clip-path: inset(0 -20px 0 0); }
    99.9% { clip-path: inset(0 -20px 0 0); }
    100%  { clip-path: inset(0 100% 0 0); }
  }
  .type-cmd0 {
    clip-path: inset(0 100% 0 0);
    animation: type-cmd0 8.233s linear 0s infinite;
  }

  @keyframes cursor-cmd0 {
