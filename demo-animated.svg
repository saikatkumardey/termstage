  <g clip-path="url(#body-clip)">
    <text x="20" y="80" font-family="'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace" font-size="14" xml:space="preserve" class="type-cmd0"><tspan fill="#4ec9b0">$ </tspan><tspan fill="#d4d4d4">pipx install termstage</tspan></text>
    <rect x="225.0" y="66" width="8.5" height="16" fill="#d4d4d4" opacity="0.7" class="cursor-cmd0" />
    <text x="20" y="102" font-family="'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace" font-size="14" fill="#aaaaaa" xml:space="preserve" class="fade-out1">installed package termstage 0.4.2</text>
    <text x="20" y="124" font-family="'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace" font-size="14" fill="#aaaaaa" xml:space="preserve" class="fade-out1">These apps are now globally available: termstage</text>
