    <text x="20" y="212" font-family="'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace" font-size="14" fill="#aaaaaa" xml:space="preserve" class="fade-out3">Edit it, then run: termstage render demo.yaml</text>
    <text x="20" y="256" font-family="'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace" font-size="14" xml:space="preserve" class="type-cmd4"><tspan fill="#4ec9b0">$ </tspan><tspan fill="#d4d4d4">termstage render demo.yaml --animated</tspan></text>
    <rect x="353.1" y="242" width="8.5" height="16" fill="#d4d4d4" opacity="0.7" class="cursor-cmd4" />
    <text x="20" y="278" font-family="'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace" font-size="14" fill="#aaaaaa" xml:space="preserve" class="fade-out5">✅ Rendered animated SVG → demo.svg</text>
    <text x="20" y="322" font-family="'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace" font-size="14" xml:space="preserve" class="type-cmd6"><tspan fill="#4ec9b0">$ </tspan><tspan fill="#d4d4d4">termstage themes</tspan></text>
    <rect x="173.7" y="308" width="8.5" height="16" fill="#d4d4d4" opacity="0.7" class="cursor-cmd6" />
    <text x="20" y="344" font-family="'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace" font-size="14" fill="#aaaaaa" xml:space="preserve" class="fade-out7">dark     ●</text>
    <text x="20" y="366" font-family="'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace" font-size="14" fill="#aaaaaa" xml:space="preserve" class="fade-out7">light    ●</text>
    <text x="20" y="388" font-family="'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace" font-size="14" fill="#aaaaaa" xml:space="preserve" class="fade-out7">dracula  ●</text>
    <text x="20" y="410" font-family="'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace" font-size="14" fill="#aaaaaa" xml:space="preserve" class="fade-out7">nord     ●</text>
