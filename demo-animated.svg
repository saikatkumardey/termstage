<svg xmlns="http://www.w3.org/2000/svg"
     width="720" height="430"
     viewBox="0 0 720 430">
  <style>
  @keyframes type-cmd0 {
    from { clip-path: inset(0 100% 0 0); }
    to   { clip-path: inset(0 0% 0 0); }
  }
  .type-cmd0 {
    clip-path: inset(0 100% 0 0);
    animation: type-cmd0 0.767s steps(23, end) 0.500s forwards;
  }

  @keyframes blink-cmd0 {
    0%, 49% { opacity: 1; }
    50%, 100% { opacity: 0; }
  }
  .cursor-cmd0 {
    opacity: 0;
    animation:
      blink-cmd0 0.6s step-end 0.500s 2,
      fade-cmd0-out 0.01s linear 1.267s forwards;
  }
  @keyframes fade-cmd0-out {
    to { opacity: 0; }
  }

  @keyframes fade-out1 {
    from { opacity: 0; }
    to   { opacity: 1; }
  }
  .fade-out1 {
    opacity: 0;
    animation: fade-out1 0.40s ease 1.267s forwards;
  }

  @keyframes type-cmd2 {
    from { clip-path: inset(0 100% 0 0); }
    to   { clip-path: inset(0 0% 0 0); }
  }
  .type-cmd2 {
    clip-path: inset(0 100% 0 0);
    animation: type-cmd2 0.533s steps(16, end) 1.967s forwards;
  }

  @keyframes blink-cmd2 {
    0%, 49% { opacity: 1; }
    50%, 100% { opacity: 0; }
  }
  .cursor-cmd2 {
    opacity: 0;
    animation:
      blink-cmd2 0.6s step-end 1.967s 1,
      fade-cmd2-out 0.01s linear 2.500s forwards;
  }
  @keyframes fade-cmd2-out {
    to { opacity: 0; }
  }

  @keyframes fade-out3 {
    from { opacity: 0; }
    to   { opacity: 1; }
  }
  .fade-out3 {
    opacity: 0;
    animation: fade-out3 0.40s ease 2.500s forwards;
  }

  @keyframes type-cmd4 {
    from { clip-path: inset(0 100% 0 0); }
    to   { clip-path: inset(0 0% 0 0); }
  }
  .type-cmd4 {
    clip-path: inset(0 100% 0 0);
    animation: type-cmd4 1.300s steps(39, end) 3.200s forwards;
  }

  @keyframes blink-cmd4 {
    0%, 49% { opacity: 1; }
    50%, 100% { opacity: 0; }
  }
  .cursor-cmd4 {
    opacity: 0;
    animation:
      blink-cmd4 0.6s step-end 3.200s 3,
      fade-cmd4-out 0.01s linear 4.500s forwards;
  }
  @keyframes fade-cmd4-out {
    to { opacity: 0; }
  }

  @keyframes fade-out5 {
    from { opacity: 0; }
    to   { opacity: 1; }
  }
  .fade-out5 {
    opacity: 0;
    animation: fade-out5 0.40s ease 4.500s forwards;
  }

  @keyframes type-c6 {
    from { clip-path: inset(0 100% 0 0); }
    to   { clip-path: inset(0 0% 0 0); }
  }
  .type-c6 {
    clip-path: inset(0 100% 0 0);
    animation: type-c6 1.967s steps(59, end) 5.200s forwards;
  }

  @keyframes type-cmd7 {
    from { clip-path: inset(0 100% 0 0); }
    to   { clip-path: inset(0 0% 0 0); }
  }
  .type-cmd7 {
    clip-path: inset(0 100% 0 0);
    animation: type-cmd7 0.600s steps(18, end) 7.767s forwards;
  }

  @keyframes blink-cmd7 {
    0%, 49% { opacity: 1; }
    50%, 100% { opacity: 0; }
  }
  .cursor-cmd7 {
    opacity: 0;
    animation:
      blink-cmd7 0.6s step-end 7.767s 2,
      fade-cmd7-out 0.01s linear 8.367s forwards;
  }
  @keyframes fade-cmd7-out {
    to { opacity: 0; }
  }

  @keyframes fade-out8 {
    from { opacity: 0; }
    to   { opacity: 1; }
  }
  .fade-out8 {
    opacity: 0;
    animation: fade-out8 0.40s ease 8.367s forwards;
  }

  </style>
  <!-- Window frame -->
  <rect x="0" y="0" width="720" height="430"
        rx="8" ry="8" fill="#282a36" />
    <!-- Title bar -->
    <rect x="0" y="0" width="720" height="38"
          rx="8" ry="8" fill="#44475a" />
    <rect x="0" y="30" width="720" height="8"
          fill="#44475a" />
    <circle cx="16" cy="19" r="6" fill="#ff5f57" />
    <circle cx="36" cy="19" r="6" fill="#febc2e" />
    <circle cx="56" cy="19" r="6" fill="#28c840" />
    <text x="360" y="24" font-family="'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace" font-size="13" fill="#f8f8f2" opacity="0.7" text-anchor="middle" dominant-baseline="middle">termstage</text>
  <!-- Terminal body -->
  <clipPath id="body-clip">
    <rect x="0" y="38" width="720" height="392" />
  </clipPath>
  <g clip-path="url(#body-clip)">
    <text x="20" y="80" font-family="'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace" font-size="14" xml:space="preserve" class="type-cmd0"><tspan fill="#50fa7b">$ </tspan><tspan fill="#f8f8f2">pip install termstage</tspan></text>
    <rect x="216.4" y="66" width="8.5" height="16" fill="#f8f8f2" opacity="0.7" class="cursor-cmd0" />
    <text x="20" y="102" font-family="'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace" font-size="14" fill="#aaaaaa" xml:space="preserve" class="fade-out1">Successfully installed termstage-0.1.0</text>
    <text x="20" y="146" font-family="'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace" font-size="14" xml:space="preserve" class="type-cmd2"><tspan fill="#50fa7b">$ </tspan><tspan fill="#f8f8f2">termstage init</tspan></text>
    <rect x="156.6" y="132" width="8.5" height="16" fill="#f8f8f2" opacity="0.7" class="cursor-cmd2" />
    <text x="20" y="168" font-family="'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace" font-size="14" fill="#aaaaaa" xml:space="preserve" class="fade-out3">Created demo.yaml — edit it, then run: termstage render demo.yaml</text>
    <text x="20" y="212" font-family="'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace" font-size="14" xml:space="preserve" class="type-cmd4"><tspan fill="#50fa7b">$ </tspan><tspan fill="#f8f8f2">termstage render demo.yaml --animated</tspan></text>
    <rect x="353.1" y="198" width="8.5" height="16" fill="#f8f8f2" opacity="0.7" class="cursor-cmd4" />
    <text x="20" y="234" font-family="'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace" font-size="14" fill="#aaaaaa" xml:space="preserve" class="fade-out5">Rendered → demo-animated.svg</text>
    <text x="20" y="278" font-family="'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace" font-size="14" fill="#6a9955" xml:space="preserve" class="type-c6"># embed the SVG anywhere — GitHub READMEs, docs, portfolios</text>
    <text x="20" y="322" font-family="'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace" font-size="14" xml:space="preserve" class="type-cmd7"><tspan fill="#50fa7b">$ </tspan><tspan fill="#f8f8f2">termstage themes</tspan></text>
    <rect x="173.7" y="308" width="8.5" height="16" fill="#f8f8f2" opacity="0.7" class="cursor-cmd7" />
    <text x="20" y="344" font-family="'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace" font-size="14" fill="#aaaaaa" xml:space="preserve" class="fade-out8">dark     #1e1e1e  VS Code Dark+</text>
    <text x="20" y="366" font-family="'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace" font-size="14" fill="#aaaaaa" xml:space="preserve" class="fade-out8">light    #ffffff  Clean light</text>
    <text x="20" y="388" font-family="'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace" font-size="14" fill="#aaaaaa" xml:space="preserve" class="fade-out8">dracula  #282a36  Dracula</text>
    <text x="20" y="410" font-family="'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace" font-size="14" fill="#aaaaaa" xml:space="preserve" class="fade-out8">nord     #2e3440  Nord</text>
  </g>
</svg>
