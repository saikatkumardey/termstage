<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg"
     width="700" height="606"
     viewBox="0 0 700 606">
  <!-- Window frame -->
  <rect x="0" y="0" width="700" height="606"
        rx="8" ry="8" fill="#2e3440" />
    <!-- Title bar -->
    <rect x="0" y="0" width="700" height="38"
          rx="8" ry="8" fill="#3b4252" />
    <!-- Fake bottom corners for title bar -->
    <rect x="0" y="30" width="700" height="8"
          fill="#3b4252" />
    <circle cx="16" cy="19" r="6" fill="#ff5f57" />
    <circle cx="36" cy="19" r="6" fill="#febc2e" />
    <circle cx="56" cy="19" r="6" fill="#28c840" />
    <text x="350" y="24" font-family="'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace" font-size="13" fill="#eceff4" opacity="0.7" text-anchor="middle" dominant-baseline="middle">dq — data query CLI</text>
  <!-- Terminal body -->
  <clipPath id="body-clip">
    <rect x="0" y="38" width="700" height="568"
          rx="0" ry="0" />
  </clipPath>
  <g clip-path="url(#body-clip)">
    <text x="20" y="80" font-family="'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace" font-size="14" fill="#6a9955" xml:space="preserve"># Load and inspect a CSV file</text>
    <text x="20" y="124" font-family="'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace" font-size="14" xml:space="preserve"><tspan fill="#88c0d0">› </tspan><tspan fill="#eceff4">dq load sales.csv</tspan></text>
    <text x="20" y="146" font-family="'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace" font-size="14" fill="#aaaaaa" xml:space="preserve">Loaded sales.csv  (12 847 rows × 8 cols)</text>
    <text x="20" y="168" font-family="'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace" font-size="14" fill="#aaaaaa" xml:space="preserve">Columns: date, region, product, qty, price, discount, revenue, rep</text>
    <text x="20" y="212" font-family="'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace" font-size="14" xml:space="preserve"><tspan fill="#88c0d0">› </tspan><tspan fill="#eceff4">dq describe revenue</tspan></text>
    <text x="20" y="234" font-family="'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace" font-size="14" fill="#aaaaaa" xml:space="preserve">count    12847</text>
    <text x="20" y="256" font-family="'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace" font-size="14" fill="#aaaaaa" xml:space="preserve">mean     $2 341.88</text>
    <text x="20" y="278" font-family="'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace" font-size="14" fill="#aaaaaa" xml:space="preserve">std      $1 108.24</text>
    <text x="20" y="300" font-family="'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace" font-size="14" fill="#aaaaaa" xml:space="preserve">min      $12.00</text>
    <text x="20" y="322" font-family="'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace" font-size="14" fill="#aaaaaa" xml:space="preserve">max      $9 990.00</text>
    <text x="20" y="366" font-family="'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace" font-size="14" fill="#6a9955" xml:space="preserve"># Run a quick aggregation</text>
    <text x="20" y="410" font-family="'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace" font-size="14" xml:space="preserve"><tspan fill="#88c0d0">› </tspan><tspan fill="#eceff4">dq group-by region --agg revenue:sum --sort desc</tspan></text>
    <text x="20" y="432" font-family="'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace" font-size="14" fill="#aaaaaa" xml:space="preserve">region      revenue</text>
    <text x="20" y="454" font-family="'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace" font-size="14" fill="#aaaaaa" xml:space="preserve">APAC        $14 291 043</text>
    <text x="20" y="476" font-family="'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace" font-size="14" fill="#aaaaaa" xml:space="preserve">EMEA        $11 873 220</text>
    <text x="20" y="498" font-family="'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace" font-size="14" fill="#aaaaaa" xml:space="preserve">AMER        $10 552 891</text>
    <text x="20" y="520" font-family="'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace" font-size="14" fill="#aaaaaa" xml:space="preserve">LATAM        $3 841 007</text>
    <text x="20" y="564" font-family="'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace" font-size="14" xml:space="preserve"><tspan fill="#88c0d0">› </tspan><tspan fill="#eceff4">dq export results.parquet</tspan></text>
    <text x="20" y="586" font-family="'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace" font-size="14" fill="#aaaaaa" xml:space="preserve">Wrote 4 rows → results.parquet  (1.2 KB)</text>
  </g>
</svg>
