<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg"
     width="700" height="562"
     viewBox="0 0 700 562">
  <!-- Window frame -->
  <rect x="0" y="0" width="700" height="562"
        rx="8" ry="8" fill="#ffffff" />
    <!-- Title bar -->
    <rect x="0" y="0" width="700" height="38"
          rx="8" ry="8" fill="#e0e0e0" />
    <!-- Fake bottom corners for title bar -->
    <rect x="0" y="30" width="700" height="8"
          fill="#e0e0e0" />
    <circle cx="16" cy="19" r="6" fill="#ff5f57" />
    <circle cx="36" cy="19" r="6" fill="#febc2e" />
    <circle cx="56" cy="19" r="6" fill="#28c840" />
    <text x="350" y="24" font-family="'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace" font-size="13" fill="#333333" opacity="0.7" text-anchor="middle" dominant-baseline="middle">req — lightweight HTTP client</text>
  <!-- Terminal body -->
  <clipPath id="body-clip">
    <rect x="0" y="38" width="700" height="524"
          rx="0" ry="0" />
  </clipPath>
  <g clip-path="url(#body-clip)">
    <text x="20" y="80" font-family="'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace" font-size="14" fill="#6a9955" xml:space="preserve"># Send a GET request</text>
    <text x="20" y="124" font-family="'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace" font-size="14" xml:space="preserve"><tspan fill="#007acc">% </tspan><tspan fill="#333333">req get https://api.example.com/users/42</tspan></text>
    <text x="20" y="146" font-family="'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace" font-size="14" fill="#aaaaaa" xml:space="preserve">HTTP/1.1 200 OK</text>
    <text x="20" y="168" font-family="'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace" font-size="14" fill="#aaaaaa" xml:space="preserve">Content-Type: application/json</text>
    <text x="20" y="190" font-family="'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace" font-size="14" fill="#aaaaaa" xml:space="preserve"></text>
    <text x="20" y="212" font-family="'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace" font-size="14" fill="#aaaaaa" xml:space="preserve">{</text>
    <text x="20" y="234" font-family="'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace" font-size="14" fill="#aaaaaa" xml:space="preserve">  &quot;id&quot;: 42,</text>
    <text x="20" y="256" font-family="'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace" font-size="14" fill="#aaaaaa" xml:space="preserve">  &quot;name&quot;: &quot;Alice Chen&quot;,</text>
    <text x="20" y="278" font-family="'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace" font-size="14" fill="#aaaaaa" xml:space="preserve">  &quot;email&quot;: &quot;alice@example.com&quot;</text>
    <text x="20" y="300" font-family="'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace" font-size="14" fill="#aaaaaa" xml:space="preserve">}</text>
    <text x="20" y="344" font-family="'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace" font-size="14" fill="#6a9955" xml:space="preserve"># POST with a JSON body</text>
    <text x="20" y="388" font-family="'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace" font-size="14" xml:space="preserve"><tspan fill="#007acc">% </tspan><tspan fill="#333333">req post /users --json &#x27;{&quot;name&quot;:&quot;Bob&quot;,&quot;role&quot;:&quot;admin&quot;}&#x27;</tspan></text>
    <text x="20" y="410" font-family="'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace" font-size="14" fill="#aaaaaa" xml:space="preserve">HTTP/1.1 201 Created</text>
    <text x="20" y="432" font-family="'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace" font-size="14" fill="#aaaaaa" xml:space="preserve">Location: /users/43</text>
    <text x="20" y="454" font-family="'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace" font-size="14" fill="#aaaaaa" xml:space="preserve"></text>
    <text x="20" y="476" font-family="'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace" font-size="14" fill="#aaaaaa" xml:space="preserve">{&quot;id&quot;: 43, &quot;name&quot;: &quot;Bob&quot;, &quot;role&quot;: &quot;admin&quot;}</text>
    <text x="20" y="520" font-family="'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace" font-size="14" xml:space="preserve"><tspan fill="#007acc">% </tspan><tspan fill="#333333">req get /users --header &#x27;X-Page: 2&#x27; --quiet</tspan></text>
    <text x="20" y="542" font-family="'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace" font-size="14" fill="#aaaaaa" xml:space="preserve">200 OK  (48 bytes, 31ms)</text>
  </g>
</svg>
